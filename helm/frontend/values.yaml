replicaCount: 1

image:
  repository: REPLACE_WITH_ECR_BASE/stockai/frontend
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 3000

# Resource limits prevent one pod from eating all node resources
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "300m"

# Environment variables for the container
env:
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: "true"
